services:
  node:
    image: node:22-alpine
    container_name: ts-api
    environment:
      - UV_THREADPOOL_SIZE=32
    working_dir: /app
    volumes:
      - .:/app
    command: sh -lc "npm ci && npx tsx watch src/server_express.ts"

  nginx:
    image: nginx:alpine
    container_name: nx-api
    ports:
      - "3000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - node